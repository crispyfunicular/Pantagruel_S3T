# Baseline cascade ASR→MT — fr→en (segments utterance, référence m-TEDx).
# Backends ASR/MT : squelette (voir 4_cascade/README.md).

experiment:
  name: "fr-en_cascade_utterance"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_001_cascade_utterance"

data:
  segment_mode: "utterance"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"

asr:
  backend: "whisper"
  model_id: "openai/whisper-large-v3"

mt:
  backend: "marian"
  model_id: "Helsinki-NLP/opus-mt-fr-en"

decode:
  asr_language: "fr"
  mt_max_length: 256
