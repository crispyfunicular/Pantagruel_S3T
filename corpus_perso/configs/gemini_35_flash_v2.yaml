# Éval corpus perso — Gemini 3.5 Flash v2 (run_005 sur m-TEDx).
# Adapter decode.max_output_tokens / thinking_level si besoin.

experiment:
  name: "fr-en_gemini_corpus_perso_35_flash_v2"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/eval_corpus_perso_gemini_35_v2"

data:
  segment_mode: "utterance"
  valid_manifest: "corpus_perso/corpus_perso_test.tsv"
  test_manifest: "corpus_perso/corpus_perso_test.tsv"

model:
  gemini_id: "gemini-3.5-flash"

prompt:
  template: "Translate the French speech to English."

decode:
  temperature: 0.0
  max_output_tokens: 8192
  thinking_level: minimal

pricing:
  input_per_1m_tokens_usd: 1.50
  output_per_1m_tokens_usd: 9.00
  fixed_per_request_usd: 0.0
