# Baseline ST end-to-end Pantagruel — fr-en, segmentation utterance (m-TEDx natif).
# Comparaison directe Table 8 Pantagruel (~17,5 BLEU pour Pantagruel-B-1k).
#
# Prérequis :
#   - datasets/manifests/fr-en/*.tsv (+ train.target.txt)
#   - datasets/processed/fr-en/ (prepare --segment-mode utterance, défaut)
#   - SPM fr-en_1000 sur cibles utterance (script run_002_…nohup.sh)
#
# Run cible : run_002_transformer_baseline_utterance

experiment:
  name: "fr-en_baseline_utterance"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_002_transformer_baseline_utterance"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-base-1K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 768
  dropout: 0.1

train:
  max_updates: 80000
  warmup_updates: 4000
  freeze_encoder_updates: 1000
  learning_rate_peak: 0.0002
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 5
  max_len_b: 128
