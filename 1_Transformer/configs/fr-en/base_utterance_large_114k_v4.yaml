# Baseline ST utterance Large 114k v4 — batch effectif LeBenchmark (piste 1 Table 8).
#
# Ajustements vs v3 (run_019 @ 20,19 test) :
#   - gradient_accumulation: 64 → batch effectif 64 (vs 8)
#   - learning_rate_peak: 2e-4 (linéaire avec batch ↑)
#   - warmup_updates: 1000 (10 % de max_updates, ratio fairseq)
#   - max_updates: 10000 (même nb de micro-batches que v3 : 80k×8 = 10k×64)
#
# Encodeur : PantagrueLLM/speech-large-114K — cible papier Table 8 ~25,2 BLEU test.
# Run cible : run_025_transformer_baseline_utterance_large_114k_v4 (OVH, ~9–10 h GPU)

experiment:
  name: "fr-en_baseline_utterance_large_114k_v4"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_025_transformer_baseline_utterance_large_114k_v4"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-114K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 1024
  dropout: 0.1

train:
  max_updates: 10000
  warmup_updates: 1000
  freeze_encoder_updates: 625
  learning_rate_peak: 0.0002
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 1
  gradient_accumulation: 64
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 500
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 4

decode:
  beam_size: 5
  max_len_b: 128
