# Baseline ST utterance Large 14k v8 — SPM 8k + SpecAugment (piste 3 Table 8, suite run_031).
#
# Base : run_026 v5 (26,12 BLEU test, vocab 1k) ; LeBenchmark 2.0 ≈ 8k sous-mots.
# Recette identique à v7 SPM 5k ; seul le tokeniseur change (run séparé obligatoire).
#
# Run cible : run_034_transformer_baseline_utterance_large_14k_v8_spm8k (Modyco, ~8–10 h GPU)

experiment:
  name: "fr-en_baseline_utterance_large_14k_v8_spm8k"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_034_transformer_baseline_utterance_large_14k_v8_spm8k"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_8000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 1024
  dropout: 0.1

spec_augment:
  enabled: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  max_updates: 80000
  warmup_updates: 4000
  freeze_encoder_updates: 5000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 4

decode:
  beam_size: 5
  max_len_b: 128
