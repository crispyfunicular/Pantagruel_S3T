# Baseline ST utterance Large 14k v6 long — recette PRD étendue + SpecAugment.
#
# Base : run_026 v5 (SpecAugment, batch 8) — prolonger vers template PRD §9 :
#   max_updates 120k, warmup 10k, early stop patience 8 (moins agressif).
# run_024 v4 (batch 64) a collapse — non repris.
#
# Run cible : run_027_transformer_baseline_utterance_large_14k_v6_long (Modyco, ~12–18 h GPU)

experiment:
  name: "fr-en_baseline_utterance_large_14k_v6_long"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_027_transformer_baseline_utterance_large_14k_v6_long"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 1024
  dropout: 0.1

spec_augment:
  enabled: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  max_updates: 120000
  warmup_updates: 10000
  freeze_encoder_updates: 5000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 8

decode:
  beam_size: 5
  max_len_b: 128
