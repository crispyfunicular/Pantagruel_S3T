# Baseline ST utterance Large 14k v5 — SpecAugment (piste 2 Table 8).
#
# Base : run_020 v3 (21,22 BLEU test, Modyco) — batch eff. 8, LR 1e-4, gel 5k.
# Ajout : masquage temporel SpecAugment (LeBenchmark 2.0 / fairseq).
# run_024 v4 (batch 64 + LR 2e-4) a collapse @ 0,35 BLEU — non repris ici.
#
# Run cible : run_026_transformer_baseline_utterance_large_14k_v5 (Modyco, ~4–6 h GPU)

experiment:
  name: "fr-en_baseline_utterance_large_14k_v5"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_026_transformer_baseline_utterance_large_14k_v5"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 1024
  dropout: 0.1

spec_augment:
  enabled: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  max_updates: 80000
  warmup_updates: 4000
  freeze_encoder_updates: 5000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 4

decode:
  beam_size: 5
  max_len_b: 128
