experiment:
  name: "fr-en_baseline"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_001_fr-en_baseline_seed42_vocab1k"
  seed: 42
  deterministic: true

data:
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/Pantagruel-Base"
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 768
  dropout: 0.1

train:
  # Pilot local (à augmenter sur machine GPU).
  max_updates: 500
  warmup_updates: 100
  freeze_encoder_updates: 0
  learning_rate_peak: 0.0002
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 50
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 5
  max_len_b: 128
