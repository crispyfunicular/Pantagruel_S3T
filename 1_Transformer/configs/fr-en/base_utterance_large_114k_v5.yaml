# Baseline ST utterance Large 114k v5 — SpecAugment (piste 2 Table 8).
#
# Base : run_019 v3 (20,19 test, OVH) + SpecAugment (recette run_026 v5 sur L-14k).
# run_025 v4 (batch 64) en collapse — non repris.
#
# Run cible : run_028_transformer_baseline_utterance_large_114k_v5 (OVH, ~9–12 h GPU)

experiment:
  name: "fr-en_baseline_utterance_large_114k_v5"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_028_transformer_baseline_utterance_large_114k_v5"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-114K"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 1024
  dropout: 0.1

spec_augment:
  enabled: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  max_updates: 80000
  warmup_updates: 4000
  freeze_encoder_updates: 5000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 4

decode:
  beam_size: 5
  max_len_b: 128
