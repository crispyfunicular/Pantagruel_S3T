# Déploie le dossier web/ sur GitHub Pages (https://crispyfunicular.github.io/Pantagruel_S3T/)
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync web HTML into docs (Pages source /docs)
        run: bash scripts/sync_web_pages.sh
      - name: Commit docs mirror if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.html docs/.nojekyll
          if ! git diff --staged --quiet; then
            git commit -m "Synchronise docs/*.html depuis web/ [skip ci]"
            git push
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./web"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
