# speechLLM B1 — fr-en, utterance, Pantagruel-L-14k (réplication run_012 sur Modyco).
#
# Config identique à b1_utterance_large_14k.yaml (max 48 tok, eval partielle dev).
# run_021 v3 (128 tok) a échoué @ 5,48 test ; run_012 OVH @ 15,03 avec 48 tok.
# Durée attendue : ~1,5–2 h GPU (< 3 h).
#
# Run cible : run_023_speechllm_b1_utterance_large_14k_replicate (Modyco)

experiment:
  name: "fr-en_speechllm_b1_utterance_large_14k_replicate"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_023_speechllm_b1_utterance_large_14k_replicate"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  llm_name: "microsoft/phi-2"
  downsample_k: 5
  projector_hidden: 2048
  freeze_encoder: true
  freeze_llm: true

prompt:
  template: "Translate the French speech to English."

train:
  max_updates: 20000
  warmup_updates: 1000
  learning_rate_peak: 0.0001
  weight_decay: 0.0
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 1000
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 1
  max_new_tokens: 48
