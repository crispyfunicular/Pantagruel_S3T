# speechLLM B1 — fr-en, utterance, L-14k, couche encodeur 9 (piste J, run_047).
#
# Référence : run_012 (dernière couche, 15,03 BLEU test) ; seul changement : encoder_layer.
# Run cible : run_047_speechllm_b1_utterance_large_14k_layer9

experiment:
  name: "fr-en_speechllm_b1_utterance_large_14k_layer9"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_047_speechllm_b1_utterance_large_14k_layer9"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  encoder_layer: 9
  llm_name: "microsoft/phi-2"
  downsample_k: 5
  projector_hidden: 2048
  freeze_encoder: true
  freeze_llm: true

prompt:
  template: "Translate the French speech to English."

train:
  max_updates: 20000
  warmup_updates: 1000
  learning_rate_peak: 0.0001
  weight_decay: 0.0
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 1000
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 1
  max_new_tokens: 48
