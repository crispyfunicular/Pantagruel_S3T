# speechLLM B1 — fr-en, utterance, encodeur Pantagruel-L-14k, version 2.
# Améliorations vs run_012 :
#   - max_new_tokens : 128 (vs 48) pour donner plus de latitude au décodeur
#   - early_stopping_patience : 3 (arrêt si BLEU dev stagne 3 évals consécutives)
#   - max_updates identique (20 000) — l'early stopping arrêtera avant si besoin
#
# Run cible : run_014_speechllm_b1_utterance_large_14k_v2

experiment:
  name: "fr-en_speechllm_b1_utterance_large_14k_v2"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_014_speechllm_b1_utterance_large_14k_v2"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-large-14K"
  trust_remote_code: true
  llm_name: "microsoft/phi-2"
  downsample_k: 5
  projector_hidden: 2048
  freeze_encoder: true
  freeze_llm: true

prompt:
  template: "Translate the French speech to English."

train:
  max_updates: 20000
  early_stopping_patience: 3
  warmup_updates: 1000
  learning_rate_peak: 0.0001
  weight_decay: 0.0
  batch_size: 1
  gradient_accumulation: 8
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 1000
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 1
  max_new_tokens: 128
