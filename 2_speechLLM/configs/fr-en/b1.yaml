experiment:
  name: "fr-en_speechllm_b1"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_001_speechllm_b1"
  seed: 42
  deterministic: true

data:
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/Pantagruel-Base"
  llm_name: "microsoft/phi-2"
  downsample_k: 5
  projector_hidden: 2048
  freeze_encoder: true
  freeze_llm: true

prompt:
  template: "Translate the French speech to English."

train:
  max_updates: 500
  warmup_updates: 100
  learning_rate_peak: 0.0001
  weight_decay: 0.0
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 50
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 4
  max_new_tokens: 128
