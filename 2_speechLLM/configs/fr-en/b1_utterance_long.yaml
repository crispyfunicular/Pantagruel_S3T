# speechLLM B1 — fr-en, utterance (m-TEDx natif), entraînement long (~20k updates).
# À comparer au papier / à la baseline ST utterance ; pas réutiliser un checkpoint sentence_like.
#
# Run cible : run_003_speechllm_b1_utterance_long

experiment:
  name: "fr-en_speechllm_b1_utterance_long"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_003_speechllm_b1_utterance_long"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  sample_rate: 16000

model:
  encoder_name: "PantagrueLLM/speech-base-1K"
  trust_remote_code: true
  llm_name: "microsoft/phi-2"
  downsample_k: 5
  projector_hidden: 2048
  freeze_encoder: true
  freeze_llm: true

prompt:
  template: "Translate the French speech to English."

train:
  max_updates: 20000
  warmup_updates: 1000
  learning_rate_peak: 0.0001
  weight_decay: 0.0
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 1000
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 1
  max_new_tokens: 48
