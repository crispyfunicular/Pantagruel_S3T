# Variante 5 — Pantagruel Speech_Text utterance aligné run_026 (run_040).
#
# Base : run_001 multimodal sentence_like (7,95 test) → utterance + recette ST run_026
# (gel 5k, LR 1e-4, warmup 4k, early stop 4, 80k updates, SpecAugment temporel).
#
# Run cible : run_040_pantagruel_multimodal_utterance_v2 (Modyco, ~2–3 h GPU)

experiment:
  name: "fr-en_pantagruel_multimodal_utterance_v2"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_040_pantagruel_multimodal_utterance_v2"
  seed: 42
  deterministic: true

data:
  segment_mode: "utterance"
  train_manifest: "datasets/manifests/fr-en/train.tsv"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

spm:
  langpair: "fr-en"
  vocab_size: 1000
  model_type: "unigram"
  manifests_root: "datasets/manifests"
  output_dir: "datasets/processed/spm"
  train_text: "datasets/manifests/fr-en/train.target.txt"
  character_coverage: 1.0

model:
  encoder_name: "PantagrueLLM/Speech_Text_Base_fr_1K_4GB"
  encoder_api: "speech_text"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 768
  dropout: 0.1

spec_augment:
  enabled: true
  mask_time_prob: 0.05
  mask_time_length: 10

train:
  max_updates: 80000
  warmup_updates: 4000
  freeze_encoder_updates: 5000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 2000
  max_eval_batches: null
  max_target_tokens: 256
  early_stopping_patience: 4

decode:
  beam_size: 5
  max_len_b: 128
