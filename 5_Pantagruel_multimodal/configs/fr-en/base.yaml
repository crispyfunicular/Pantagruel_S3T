# Variante 5 — Pantagruel Speech_Text (encodeur multimodal) + décodeur Transformer fr→en.
# Données sentence_like (aligné speechLLM / Gemini sentence_like).
# Run distant type : run_001_pantagruel_multimodal

experiment:
  name: "fr-en_pantagruel_multimodal_sentence"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_001_pantagruel_multimodal"
  seed: 42
  deterministic: true

data:
  segment_mode: "sentence_like"
  train_manifest: "datasets/manifests_sentence/fr-en/train.tsv"
  valid_manifest: "datasets/manifests_sentence/fr-en/valid.tsv"
  test_manifest: "datasets/manifests_sentence/fr-en/test.tsv"
  spm_model: "datasets/processed/spm/fr-en_1000.model"
  sample_rate: 16000

# SentencePiece sur les cibles anglaises sentence_like (une fois, avant train).
spm:
  langpair: "fr-en"
  vocab_size: 1000
  model_type: "unigram"
  manifests_root: "datasets/manifests_sentence"
  output_dir: "datasets/processed/spm"
  train_text: "datasets/manifests_sentence/fr-en/train.target.txt"
  character_coverage: 1.0

model:
  encoder_name: "PantagrueLLM/Speech_Text_Base_fr_1K_4GB"
  encoder_api: "speech_text"
  trust_remote_code: true
  decoder_layers: 6
  decoder_heads: 8
  hidden_dim: 768
  dropout: 0.1

train:
  # Pilot GPU (~2–4 h selon machine) ; augmenter pour run long type speechLLM.
  max_updates: 5000
  warmup_updates: 500
  freeze_encoder_updates: 1000
  learning_rate_peak: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  batch_size: 2
  gradient_accumulation: 4
  gradient_clip_norm: 1.0
  amp_dtype: "fp16"
  eval_every_updates: 500
  max_eval_batches: 20
  max_target_tokens: 256

decode:
  beam_size: 4
  max_len_b: 128

cost:
  usd_per_gpu_hour: 0.0
