# Gemini 2.5 Flash — utterance (m-TEDx natif), comparaison Table 8 Pantagruel.
# Prérequis : datasets/manifests/fr-en/{valid,test}.tsv + WAV processed/fr-en/

experiment:
  name: "fr-en_gemini_flash_utterance"
  lang_pair: "fr-en"
  output_dir: "runs/fr-en/run_002_gemini_flash_utterance"

data:
  segment_mode: "utterance"
  valid_manifest: "datasets/manifests/fr-en/valid.tsv"
  test_manifest: "datasets/manifests/fr-en/test.tsv"

model:
  gemini_id: "gemini-2.5-flash"

prompt:
  template: "Translate the French speech to English."

decode:
  temperature: 0.0
  max_output_tokens: 256

pricing:
  input_per_1m_tokens_usd: 1.00
  output_per_1m_tokens_usd: 2.50
  fixed_per_request_usd: 0.0
